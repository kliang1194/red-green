<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🌈 Sounds Gay I'm In | ⚖️ Flag Court</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

h1 {
  color: white;
  font-size: clamp(2rem, 8vw, 2.8rem);
  margin: 0 20px 10px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

h2 {
  color: white;
  font-size: clamp(1rem, 4vw, 1.2rem);
  line-height: 1.5;
  margin: 0 20px 25px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

.game-title {
  display: inline-block;
  margin-top: 20px;
  font-size: 1.4em;
  font-weight: 900;
}

.instruction {
  display: inline-block;
  margin-top: 10px;
  font-size: .9em;
  font-weight: 600;
  font-style: italic;
}

.buttons {
  display: flex;
  gap: 20px;
  width: 90%;
  max-width: 500px;
}

button {
  border: none;
  border-radius: 30px;
  font-size: clamp(1rem, 5vw, 1.5rem);
  font-weight: 800;
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

.flag-button {
  flex: 1;
  aspect-ratio: 1;
}

.red {
  background: #d90429;
}

.green {
  background: #00b050;
}

#choice {
  display: none;
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(3rem, 12vw, 5rem);
  color: white;
  font-weight: 900;
  text-shadow: 0 5px 15px rgba(0,0,0,.3);
}

#reset,
#finish,
#restart {
  padding: 15px 30px;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: 1rem;
  font-weight: 700;
}

#reset {
  display: none;
  position: fixed;
  bottom: 30px;
}

#scoreboard {
  margin-top: 25px;
  color: white;
}

.score-title {
  font-size: 1rem;
  font-weight: 700;
}

#score {
  font-size: 3rem;
  font-weight: 900;
}

.score-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 10px;
}

.score-buttons button {
  padding: 12px 14px;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: .85rem;
}

#reset-score {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: .85rem;
}

#final-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
  color: white;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

#final-screen h1 {
  margin-bottom: 20px;
}

.final-score {
  font-size: 5rem;
  font-weight: 900;
}

</style>
</head>

<body>

<div id="app">

  <h1>🌈 Sounds Gay I'm In 🌈</h1>

  <h2>
    Saturday, July 25th, 2026
    <br>
    <span class="game-title">⚖️ Flag Court ⚖️</span>
    <br>
    <span class="instruction">Choose your verdict</span>
  </h2>

  <div class="buttons" id="buttons">

    <button class="flag-button red" onclick="choose('#d90429','🚩 RED FLAG')">
      🚩<br>RED FLAG
    </button>

    <button class="flag-button green" onclick="choose('#00b050','💚 GREEN FLAG')">
      💚<br>GREEN FLAG
    </button>

  </div>


  <div id="scoreboard">

    <div class="score-title">Your Score</div>
    <div id="score">0</div>

    <div class="score-buttons">
      <button onclick="addPoints(3)">🏆 +3</button>
      <button onclick="addPoints(2)">⚖️ +2</button>
      <button onclick="addPoints(1)">🚩 +1</button>
    </div>

    <button id="reset-score" onclick="resetScore()">
      Reset Score
    </button>

    <br>

    <button id="finish" onclick="finishGame()">
      Finish Game
    </button>

  </div>

</div>


<div id="choice"></div>

<button id="reset" onclick="resetChoice()">
  Reset
</button>


<div id="final-screen">

  <h1>⚖️ Court Adjourned ⚖️</h1>

  <div class="final-score" id="final-score">
    0
  </div>

  <h2>
    Final Score
    <br>
    🌈 Thanks for playing Flag Court
  </h2>

  <button id="restart" onclick="restartGame()">
    Play Again
  </button>

</div>


<script>

let score = 0;

function choose(color, text) {

  document.body.style.background = color;

  document.getElementById("buttons").style.display = "none";
  document.getElementById("scoreboard").style.display = "none";
  document.querySelector("h1").style.display = "none";
  document.querySelector("h2").style.display = "none";

  const choice = document.getElementById("choice");
  choice.innerHTML = text;
  choice.style.display = "flex";

  document.getElementById("reset").style.display = "block";

  if (navigator.vibrate) {
    navigator.vibrate(100);
  }

}


function resetChoice() {

  document.body.style.background =
    "linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff)";

  document.getElementById("buttons").style.display = "flex";
  document.getElementById("scoreboard").style.display = "block";
  document.querySelector("h1").style.display = "block";
  document.querySelector("h2").style.display = "block";

  document.getElementById("choice").style.display = "none";
  document.getElementById("reset").style.display = "none";

}


function addPoints(points) {

  score += points;
  document.getElementById("score").innerHTML = score;

  if (navigator.vibrate) {
    navigator.vibrate(50);
  }

}


function resetScore() {

  score = 0;
  document.getElementById("score").innerHTML = 0;

}


function finishGame() {

  document.getElementById("final-score").innerHTML = score;

  document.getElementById("final-screen").style.display = "flex";

}


function restartGame() {

  score = 0;

  document.getElementById("score").innerHTML = 0;

  document.getElementById("final-screen").style.display = "none";

  document.getElementById("buttons").style.display = "flex";
  document.getElementById("scoreboard").style.display = "block";

}


</script>

</body>
</html>
