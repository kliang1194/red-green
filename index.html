<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>🌈 Sounds Gay I'm In | ⚖️ Flag Court</title>

<style>

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

h1 {
  color: white;
  font-size: clamp(1.4rem, 6vw, 2.8rem);
  margin: 0 5px 10px;
  white-space: nowrap;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

h2 {
  color: white;
  font-size: clamp(1rem, 4vw, 1.2rem);
  line-height: 1.5;
  margin-bottom: 25px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

.game-title {
  font-size: 1.4em;
  font-weight: 900;
}

.instruction {
  font-style: italic;
  font-weight: 600;
}

.buttons {
  display: flex;
  gap: 20px;
  width: 90%;
  max-width: 500px;
}

button {
  border: none;
  border-radius: 30px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

.flag-button {
  flex: 1;
  aspect-ratio: 1;
  font-size: clamp(1rem, 5vw, 1.5rem);
  color: white;
}

.red {
  background: #d90429;
}

.green {
  background: #00b050;
}


/* SCORE */

#scoreboard {
  color: white;
  margin-top: 30px;
}

.score-title {
  font-size: 1.5rem;
  font-weight: 900;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

#score {
  font-size: 4rem;
  font-weight: 900;
  line-height: 1;
  margin: 8px 0 25px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

#reset-score,
#finish {
  padding: 14px 25px;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: 1rem;
}


/* FLAG RESULT SCREEN */

#choice-screen {
  display: none;
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 900;
  text-align: center;
}

#choice-score {
  font-size: 1.5rem;
  margin-top: 30px;
}

#choice-scoring {
  display: flex;
  gap: 12px;
  margin-top: 25px;
}

#choice-scoring button {
  width: 105px;
  height: 105px;
  border-radius: 25px;
  background: white;
  color: #333;
  font-size: 0.85rem;
  font-weight: 900;
  line-height: 1.2;
}

#choice-scoring span {
  font-size: 0.9rem;
}

#change-choice {
  margin-top: 25px;
  padding: 14px 25px;
  border-radius: 999px;
  background: white;
  color: #333;
}


/* FINAL SCREEN */

#final-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
  color: white;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.final-label {
  font-size: 1.5rem;
  font-weight: 900;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
  margin-bottom: 10px;
}

.final-score {
  font-size: 5rem;
  font-weight: 900;
  line-height: 1;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

</style>

  </head>

<body>


<div id="app">

<h1>🌈 Sounds Gay I'm In 🌈</h1>

<h2>
Saturday, July 25th, 2026
<br><br>
<span class="game-title">⚖️ Flag Court ⚖️</span>
<br>
<span class="instruction">Choose your verdict</span>
</h2>


<div class="buttons">

<button class="flag-button red" onclick="chooseFlag('#d90429','🚩 RED FLAG')">
🚩<br>RED FLAG
</button>


<button class="flag-button green" onclick="chooseFlag('#00b050','💚 GREEN FLAG')">
💚<br>GREEN FLAG
</button>

</div>



<div id="scoreboard">

<div class="score-title">
Your Score
</div>

<div id="score">
0
</div>


<button id="reset-score" onclick="resetScore()">
Reset Score
</button>

<br><br>

<button id="finish" onclick="finishGame()">
Finish Game
</button>

</div>


</div>




<div id="choice-screen">


<div id="choice-text"></div>


<div id="choice-score">
Your Score: <span id="choice-score-number">0</span>
</div>


<div id="choice-scoring">


<button onclick="addPoints(3)">
🏆<br>
Majority<br>
<span>+3 pts</span>
</button>


<button onclick="addPoints(2)">
⚖️<br>
Approved<br>
<span>+2 pts</span>
</button>


<button onclick="addPoints(1)">
🚩<br>
Minority<br>
<span>+1 pt</span>
</button>


</div>


<button id="change-choice" onclick="changeChoice()">
Change Choice
</button>


</div>





<div id="final-screen">

<h1>
⚖️ Court Adjourned ⚖️
</h1>


<div class="final-label">
Final Score
</div>

<div class="final-score" id="final-score">
0
</div>

<h2>
🌈 Thanks for playing Flag Court
</h2>


<button onclick="restartGame()">
Play Again
</button>


</div>





<script>

let score = Number(localStorage.getItem("flagCourtScore")) || 0;


updateScores();



function chooseFlag(color,text){

  document.getElementById("app").style.display="none";

  let screen = document.getElementById("choice-screen");

  screen.style.display="flex";
  screen.style.background=color;

  document.getElementById("choice-text").innerHTML=text;

  updateScores();

}




function addPoints(points){

  score += points;

  localStorage.setItem("flagCourtScore", score);

  updateScores();


  setTimeout(()=>{
    changeChoice();
  },500);

}




function updateScores(){

  document.getElementById("score").innerHTML = score;

  document.getElementById("choice-score-number").innerHTML = score;

}




function changeChoice(){

  document.getElementById("choice-screen").style.display="none";

  document.getElementById("app").style.display="flex";

}




function resetScore(){

  score = 0;

  localStorage.setItem("flagCourtScore", 0);

  updateScores();

}




function finishGame(){

  document.getElementById("final-score").innerHTML = score;

  document.getElementById("final-screen").style.display="flex";

}




function restartGame(){

  score = 0;

  localStorage.removeItem("flagCourtScore");

  updateScores();

  document.getElementById("final-screen").style.display="none";

  document.getElementById("app").style.display="flex";

}


</script>


</body>
</html>
