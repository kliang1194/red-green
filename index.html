<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🌈 Sounds Gay I'm In | ⚖️ Flag Court</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

h1 {
  color: white;
  font-size: clamp(2rem, 8vw, 2.8rem);
  margin: 0 20px 10px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

h2 {
  color: white;
  font-size: clamp(1rem, 4vw, 1.2rem);
  line-height: 1.5;
  margin: 0 20px 35px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

.game-title {
  display: inline-block;
  margin-top: 20px;
  font-size: 1.4em;
  font-weight: 900;
}

.buttons {
  display: flex;
  gap: 20px;
  width: 90%;
  max-width: 500px;
}

button {
  flex: 1;
  aspect-ratio: 1;
  border: none;
  border-radius: 30px;
  font-size: clamp(1rem, 5vw, 1.5rem);
  font-weight: 800;
  color: white;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
  cursor: pointer;
}

.red {
  background: #d90429;
}

.green {
  background: #00b050;
}

#choice {
  display: none;
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: clamp(3rem, 12vw, 5rem);
  color: white;
  font-weight: 900;
  text-shadow: 0 5px 15px rgba(0,0,0,.3);
}

#reset {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 30px;
  border-radius: 999px;
  background: white;
  color: #333;
  font-size: 1rem;
  font-weight: 700;
  aspect-ratio: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div id="app">

  <h1>🌈 Sounds Gay I'm In 🌈</h1>

  <h2>
    Saturday, July 25th, 2026
    <br>
    <span class="game-title">⚖️ Flag Court ⚖️</span>
  </h2>

  <div class="buttons" id="buttons">

    <button class="red" onclick="choose('#d90429','🚩 RED FLAG')">
      🚩<br>RED FLAG
    </button>

    <button class="green" onclick="choose('#00b050','💚 GREEN FLAG')">
      💚<br>GREEN FLAG
    </button>

  </div>

</div>


<div id="choice"></div>

<button id="reset" onclick="resetChoice()">
  Reset
</button>


<script>

function choose(color, text) {

  document.body.style.background = color;

  document.getElementById("buttons").style.display = "none";
  document.querySelector("h1").style.display = "none";
  document.querySelector("h2").style.display = "none";

  const choice = document.getElementById("choice");
  choice.innerHTML = text;
  choice.style.display = "flex";

  document.getElementById("reset").style.display = "block";

  if (navigator.vibrate) {
    navigator.vibrate(100);
  }

  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}


function resetChoice() {

  document.body.style.background =
    "linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff)";

  document.getElementById("buttons").style.display = "flex";
  document.querySelector("h1").style.display = "block";
  document.querySelector("h2").style.display = "block";

  document.getElementById("choice").style.display = "none";
  document.getElementById("reset").style.display = "none";

}

</script>

</body>
</html>
