<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🌈 Sounds Gay I'm In | ⚖️ Flag Court</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

h1 {
  color: white;
  font-size: clamp(2rem, 8vw, 2.8rem);
  margin: 0 20px 10px;
  text-shadow: 0 3px 10px rgba(0,0,0,.25);
}

h2 {
  color: white;
  font-size: clamp(1rem, 4vw, 1.2rem);
  line-height: 1.5;
  margin-bottom: 25px;
}

.game-title {
  font-size: 1.4em;
  font-weight: 900;
}

.instruction {
  font-style: italic;
  font-weight: 600;
}

.buttons {
  display: flex;
  gap: 20px;
  width: 90%;
  max-width: 500px;
}

button {
  border: none;
  border-radius: 30px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,.25);
}

.flag-button {
  flex: 1;
  aspect-ratio: 1;
  font-size: clamp(1rem, 5vw, 1.5rem);
  color: white;
}

.red {
  background: #d90429;
}

.green {
  background: #00b050;
}

#scoreboard {
  color: white;
  margin-top: 25px;
}

.score-title {
  font-weight: 700;
}

#score {
  font-size: 3rem;
  font-weight: 900;
}

.score-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.score-buttons button,
#reset-score,
#finish,
#change-choice {
  padding: 12px 18px;
  border-radius: 999px;
  background: white;
  color: #333;
}

#choice-screen {
  display: none;
  position: fixed;
  inset: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 900;
  text-align: center;
}

#choice-score {
  font-size: 1.5rem;
  margin-top: 30px;
}

#choice-scoring {
  margin-top: 20px;
}

#change-choice {
  margin-top: 25px;
}

#final-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcB77, #4d96ff, #c77dff);
  color: white;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.final-score {
  font-size: 5rem;
  font-weight: 900;
}

</style>
</head>

<body>

<div id="app">

<h1>🌈 Sounds Gay I'm In 🌈</h1>

<h2>
Saturday, July 25th, 2026
<br>
<span class="game-title">⚖️ Flag Court ⚖️</span>
<br>
<span class="instruction">Choose your verdict</span>
</h2>

<div class="buttons">

<button class="flag-button red" onclick="chooseFlag('#d90429','🚩 RED FLAG')">
🚩<br>RED FLAG
</button>

<button class="flag-button green" onclick="chooseFlag('#00b050','💚 GREEN FLAG')">
💚<br>GREEN FLAG
</button>

</div>


<div id="scoreboard">

<div class="score-title">Your Score</div>
<div id="score">0</div>

<button id="reset-score" onclick="resetScore()">
Reset Score
</button>

<br><br>

<button id="finish" onclick="finishGame()">
Finish Game
</button>

</div>

</div>


<div id="choice-screen">

<div id="choice-text"></div>

<div id="choice-score">
Your Score: <span id="choice-score-number">0</span>
</div>

<div id="choice-scoring">

<button onclick="addPoints(3)">🏆 +3</button>
<button onclick="addPoints(2)">⚖️ +2</button>
<button onclick="addPoints(1)">🚩 +1</button>

</div>

<button id="change-choice" onclick="changeChoice()">
Change Choice
</button>

</div>


<div id="final-screen">

<h1>⚖️ Court Adjourned ⚖️</h1>

<div class="final-score" id="final-score">
0
</div>

<h2>
Final Score
<br>
🌈 Thanks for playing Flag Court
</h2>

<button onclick="restartGame()">
Play Again
</button>

</div>


<script>

let score = 0;


function chooseFlag(color,text){

document.getElementById("app").style.display="none";

let screen=document.getElementById("choice-screen");

screen.style.display="flex";
screen.style.background=color;

document.getElementById("choice-text").innerHTML=text;

updateScores();

}


function addPoints(points){

score += points;

updateScores();

setTimeout(()=>{
changeChoice();
},500);

}


function updateScores(){

document.getElementById("score").innerHTML=score;
document.getElementById("choice-score-number").innerHTML=score;

}


function changeChoice(){

document.getElementById("choice-screen").style.display="none";
document.getElementById("app").style.display="flex";

}


function resetScore(){

score=0;
updateScores();

}


function finishGame(){

document.getElementById("final-score").innerHTML=score;

document.getElementById("final-screen").style.display="flex";

}


function restartGame(){

score=0;
updateScores();

document.getElementById("final-screen").style.display="none";
document.getElementById("app").style.display="flex";

}

</script>

</body>
</html>
